name: Build fnOS Hermes Agent FPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（格式：0.18.0，留空则使用 manifest 中的版本）'
        required: false
        default: ''

permissions:
  contents: write

env:
  APP_NAME: "hermes-agent"
  MANIFEST_FILE: "manifest"

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    outputs:
      fpk_name: ${{ steps.build.outputs.fpks }}
      version: ${{ steps.version.outputs.version }}

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置时区
      - name: Set timezone
        run: sudo timedatectl set-timezone "Asia/Shanghai"

      # 3. 读取 manifest 版本信息
      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep "^version" ${{ env.MANIFEST_FILE }} | awk -F'=' '{print $2}' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "从 manifest 读取的版本号：v$VERSION"

      # 4. 确定最终版本号
      - name: Determine target version
        id: target_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET_VERSION="${{ github.event.inputs.version }}"
            echo "使用输入的版本号：v$TARGET_VERSION"
          else
            TARGET_VERSION="${{ steps.version.outputs.version }}"
            echo "使用 manifest 版本号：v$TARGET_VERSION"
          fi
          echo "target_version=$TARGET_VERSION" >> $GITHUB_OUTPUT

      # 5. 安装 fnpack 工具
      - name: Install fnpack
        run: |
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.0.4-linux-amd64"
          curl -fsSL "$FNPACK_URL" -o fnpack
          chmod +x fnpack
          mv fnpack /usr/local/bin/
          fnpack --version
          echo "fnpack 已安装并可用"

      # 6. 更新 manifest 版本号
      - name: Update manifest version
        run: |
          sed -i "s/^version.*=.*/version               = ${{ steps.target_version.outputs.target_version }}/" ${{ env.MANIFEST_FILE }}
          echo "Updated manifest:"
          grep "^version" ${{ env.MANIFEST_FILE }}

      # 7. 创建输出目录
      - name: Create dist directory
        run: mkdir -p dist

      # 8. 打包应用
      - name: Build FPK
        id: build
        run: |
          FNPACK="fnpack"
          APP_DIR="$GITHUB_WORKSPACE"
          
          echo "开始打包：${{ env.APP_NAME }}"
          echo "目标版本：${{ steps.target_version.outputs.target_version }}"
          echo "包目录：$APP_DIR"
          
          cd "$APP_DIR"
          
          # 执行打包
          "$FNPACK" build --directory "$APP_DIR" || {
            echo "::error:: fnpack 打包失败"
            exit 1
          }
          
          SOURCE_FPK="${{ env.APP_NAME }}.fpk"
          DIST_DIR="dist"
          TARGET_NAME="fnos-${{ env.APP_NAME }}_v${{ steps.target_version.outputs.target_version }}.fpk"
          
          if [ -f "$SOURCE_FPK" ]; then
            mv "$SOURCE_FPK" "$DIST_DIR/$TARGET_NAME"
            SIZE=$(du -h "$DIST_DIR/$TARGET_NAME" | cut -f1)
            echo "打包成功：$TARGET_NAME ($SIZE)"
            echo "fpks=$TARGET_NAME" >> $GITHUB_OUTPUT
            echo "size=$SIZE" >> $GITHUB_OUTPUT
          else
            echo "::error:: fnpack 未生成 FPK 文件"
            exit 1
          fi

      # 9. 准备 Release 说明
      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.target_version.outputs.target_version }}"
          FPK_NAME="fnos-${{ env.APP_NAME }}_v${VERSION}.fpk"
          
          cat > release_body.md << 'EOF'
# fnOS Hermes Agent

AI 助手应用，专为飞牛 NAS 打造。

## 功能特性

- **多模型支持**: OpenRouter、OpenAI、Anthropic、Kimi、MiniMax 等
- **消息平台接入**: 微信、Telegram、Discord、Slack、QQ、钉钉、飞书等
- **对话管理**: 多轮对话、会话记忆、技能系统
- **文件操作**: 图片识别、文档分析、报告生成
- **自动更新**: 内置版本检查与在线升级

## 安装方法

在飞牛应用中心上传此 FPK 安装包即可。

## 技术细节

- **运行环境**: fnOS 4.0+
- **依赖项**: bunjs
- **数据路径**: `/vol1/@apphome/hermes-agent/data/`
- **日志路径**: `/var/apps/hermes-agent/var/hermes.log`

## 已知问题

- 首次安装需要下载 Python 依赖包，请耐心等待
- 微信绑定二维码有效期约 2 分钟

---

基于 [Hermes Agent](https://github.com/NousResearch/hermes-agent)

*Commit: ${{ github.sha }}*
EOF

          echo "Release notes 已生成"

      # 10. 创建 Draft Release
      - name: Create Draft Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.target_version.outputs.target_version }}"
          FPK_NAME="fnos-${{ env.APP_NAME }}_v${VERSION}.fpk"
          RELEASE_TAG="fnos-hermes-agent_v${VERSION}"
          DIST_DIR="dist"
          
          echo "创建 Draft Release: $RELEASE_TAG"
          
          gh release create "$RELEASE_TAG" \
            "$DIST_DIR/$FPK_NAME" \
            --draft \
            --title "$RELEASE_TAG" \
            --notes-file release_body.md \
            --verify-tag || {
              echo "::error:: 创建 Release 失败"
              exit 1
          }
          
          echo "Draft Release 已创建"
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" >> $GITHUB_OUTPUT

      # 11. 构建摘要
      - name: Build Summary
        run: |
          echo "### ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 版本 | FPK 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| fnOS Hermes Agent | v${{ steps.target_version.outputs.target_version }} | fnos-hermes-agent_v${{ steps.target_version.outputs.version }}.fpk | ${{ steps.build.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**[Draft Release](https://github.com/${{ github.repository }}/releases)** — 请确认后发布" >> $GITHUB_STEP_SUMMARY
